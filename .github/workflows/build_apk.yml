name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install --upgrade pip
          pip3 install buildozer cython
      - name: Prepare
        run: |
          cp DDL/main.py DDL/support.py AI_writing/
          cd AI_writing
          python3 -c "import sys; f=open('main_app.py','r'); c=f.read(); f.close(); c=c.replace('sys.path.append(os.path.dirname(os.path.dirname(os.path.abspath(__file__))))\nfrom main import MISSIONS','from main import MISSIONS'); f=open('main_app.py','w'); f.write(c); f.close(); print('OK')"
      - name: Build
        run: cd AI_writing && buildozer android debug 2>&1
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DDLPlanner-APK
          path: AI_writing/bin/*.apk
          if-no-files-found: error
